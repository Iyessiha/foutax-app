<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FoutaX - La plateforme fintech educative dediee aux marches boursiers africains. Invest, Learn, Grow" />
    <meta name="theme-color" content="#0A1628" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>FoutaX - Invest, Learn, Grow</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #0A1628;
        color: #FFFFFF;
        font-family: 'DM Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0A1628; }
      ::-webkit-scrollbar-thumb { background: #2A3A55; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #E8A020; }
      input::placeholder { color: rgba(255,255,255,0.2); }
      select option { background: #0F1F38; color: #fff; }
      ::selection { background: rgba(232,160,32,0.3); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
